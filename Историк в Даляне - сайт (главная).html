document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ru\" data-lang=\"ru\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Исторические программы в Даляне и Порт-Артуре · авторский проект<\u002Ftitle>\n<meta name=\"description\" content=\"Авторские исторические прогулки-лекции по Даляню и Порт-Артуру (Люйшунь). Ведёт историк-архивист. Программы на русском языке.\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<link href=\"https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&amp;family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap\" rel=\"stylesheet\">\n<style>/* === Port-Artur — shared design system (extracted from v2 landing) === */\n/* ---------- tokens ---------- */\n  :root {\n    --paper:        #efe7d2;\n    --paper-deep:   #e4d9bc;\n    --paper-soft:   #f4ecd8;\n    --ink:          #1a1611;\n    --ink-soft:     #463d33;\n    --ink-mute:     #7a6f5e;\n    --rule:         rgba(26, 22, 17, 0.20);\n    --rule-soft:    rgba(26, 22, 17, 0.10);\n    --copper:       #7a2e2a;\n    --copper-deep:  #5a201d;\n    --bronze:       #8b5a3c;     /* secondary accent — old bronze */\n    --dark-bg:      #2a211a;     /* warm near-black */\n    --dark-bg-2:    #221a14;\n\n    --serif-display: \"EB Garamond\", \"Times New Roman\", Georgia, serif;\n    --serif-text:    \"Source Serif 4\", \"EB Garamond\", Georgia, serif;\n    --mono:          \"JetBrains Mono\", ui-monospace, \"SF Mono\", Consolas, monospace;\n\n    --gutter: clamp(20px, 4vw, 56px);\n    --max:    1320px;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; }\n  html { -webkit-text-size-adjust: 100%; }\n  @media (prefers-reduced-motion: no-preference) { html { scroll-behavior: smooth; } }\n\n  body {\n    margin: 0;\n    background: var(--paper);\n    color: var(--ink);\n    font-family: var(--serif-text);\n    font-size: 18px;\n    line-height: 1.55;\n    font-feature-settings: \"kern\", \"liga\", \"onum\";\n    text-rendering: optimizeLegibility;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* paper grain */\n  body::before {\n    content: \"\";\n    position: fixed;\n    inset: 0;\n    pointer-events: none;\n    z-index: 1;\n    opacity: 0.45;\n    mix-blend-mode: multiply;\n    background-image:\n      radial-gradient(rgba(26, 22, 17, 0.06) 1px, transparent 1px),\n      radial-gradient(rgba(26, 22, 17, 0.05) 1px, transparent 1px);\n    background-size: 3px 3px, 7px 7px;\n    background-position: 0 0, 1px 2px;\n  }\n\n  ::selection { background: var(--copper); color: var(--paper); }\n\n  a { color: inherit; text-decoration: none; }\n  p { margin: 0; text-wrap: pretty; }\n  h1, h2, h3, h4 { margin: 0; font-weight: 500; letter-spacing: -0.005em; }\n\n  .wrap {\n    max-width: var(--max);\n    margin: 0 auto;\n    padding: 0 var(--gutter);\n    position: relative;\n    z-index: 2;\n  }\n\n  /* ---------- type utilities ---------- */\n  .display {\n    font-family: var(--serif-display);\n    font-weight: 500;\n    line-height: 1.02;\n    letter-spacing: -0.018em;\n  }\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    font-weight: 500;\n  }\n  .lead {\n    font-size: 19px;\n    line-height: 1.6;\n    color: var(--ink-soft);\n    max-width: 56ch;\n  }\n  em.cu, .cu em { font-style: italic; color: var(--copper); font-weight: 400; }\n\n  /* ---------- header ---------- */\n  .topbar { position: relative; z-index: 5; border-bottom: 1px solid var(--rule); }\n  .topbar-inner {\n    display: flex; align-items: baseline; justify-content: space-between; gap: 24px;\n    padding: 18px var(--gutter); max-width: var(--max); margin: 0 auto;\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--ink-mute);\n  }\n  .mark { display: inline-flex; align-items: baseline; gap: 12px; color: var(--ink); }\n  .mark-glyph {\n    font-family: var(--serif-display); font-style: italic; font-size: 22px;\n    line-height: 1; text-transform: none; color: var(--copper);\n  }\n  .topbar-meta { display: flex; gap: 28px; }\n  .topbar-meta span:nth-child(2) { color: var(--ink-soft); }\n  @media (max-width: 720px) { .topbar-meta span:not(:last-child) { display: none; } }\n\n  /* ---------- hero ---------- */\n  .hero {\n    position: relative;\n    padding: clamp(48px, 7vw, 96px) 0 clamp(64px, 9vw, 120px);\n    border-bottom: 1px solid var(--rule);\n    overflow: hidden;\n  }\n  .hero-grid {\n    display: grid;\n    grid-template-columns: 1.15fr 1fr;\n    gap: clamp(32px, 5vw, 80px);\n    align-items: end;\n  }\n  .hero-eyebrow {\n    display: flex; align-items: center; gap: 14px; margin-bottom: 36px;\n  }\n  .hero-eyebrow .dash { width: 32px; height: 1px; background: var(--copper); }\n  h1.hero-title {\n    font-size: clamp(48px, 7vw, 96px);\n    line-height: 1.05;\n    margin-bottom: 36px;\n  }\n  .hero-subtitle {\n    font-family: var(--serif-display); font-style: italic;\n    font-size: clamp(20px, 2vw, 26px); line-height: 1.35;\n    color: var(--ink-soft); margin-bottom: 28px; max-width: 32ch;\n  }\n  .hero-lead { max-width: 50ch; margin-bottom: 40px; }\n  .hero-actions { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }\n\n  .hero-meta-strip {\n    margin-top: clamp(48px, 6vw, 80px);\n    border-top: 1px solid var(--rule);\n    padding-top: 20px;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 24px;\n  }\n  .hero-meta-strip dt {\n    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--ink-mute); margin-bottom: 6px;\n  }\n  .hero-meta-strip dd {\n    margin: 0; font-family: var(--serif-display);\n    font-size: clamp(18px, 1.5vw, 22px); line-height: 1.2; color: var(--ink);\n  }\n  @media (max-width: 720px) {\n    .hero-meta-strip { grid-template-columns: repeat(2, 1fr); gap: 20px 24px; }\n  }\n\n  /* ---------- buttons ---------- */\n  .btn {\n    --bg: var(--copper); --fg: var(--paper);\n    display: inline-flex; align-items: center; gap: 14px;\n    padding: 16px 28px;\n    background: var(--bg); color: var(--fg);\n    font-family: var(--serif-text); font-size: 16px; line-height: 1;\n    border: 1px solid var(--bg); cursor: pointer;\n    transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;\n  }\n  .btn:hover { background: var(--copper-deep); border-color: var(--copper-deep); }\n  .btn .arrow {\n    width: 18px; height: 1px; background: currentColor; position: relative;\n  }\n  .btn .arrow::after {\n    content: \"\"; position: absolute; right: 0; top: 50%;\n    width: 6px; height: 6px;\n    border-top: 1px solid currentColor; border-right: 1px solid currentColor;\n    transform: translateY(-50%) rotate(45deg); transform-origin: right center;\n  }\n  .btn--ghost { --bg: transparent; --fg: var(--ink); border-color: var(--rule); }\n  .btn--ghost:hover { background: transparent; border-color: var(--ink); color: var(--ink); }\n  .btn--on-dark { --bg: var(--copper); --fg: var(--paper); }\n  .btn--ghost-on-dark {\n    --bg: transparent; --fg: var(--paper); border-color: rgba(239, 231, 210, 0.30);\n  }\n  .btn--ghost-on-dark:hover { border-color: var(--paper); color: var(--paper); background: transparent; }\n\n  .link-inline {\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;\n    text-transform: uppercase; color: var(--ink-mute);\n    border-bottom: 1px solid var(--rule); padding-bottom: 4px;\n  }\n  .link-inline:hover { color: var(--ink); border-bottom-color: var(--ink); }\n\n  /* ---------- photo slot ---------- */\n  /* Generic placeholder for the user's archival photographs.\n     Style mimics an empty plate in an archive album, NOT a gap: 4px; padding: 8px 12px 14px; }\n.cal-cell {\n  aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;\n  font-family: var(--serif-text); font-size: 15px; border: 1px solid transparent; background: transparent;\n  color: var(--ink); cursor: pointer; position: relative;\n}\n.cal-cell.empty { cursor: default; }\n.cal-cell.busy { color: var(--ink-mute); cursor: not-allowed; text-decoration: line-through; opacity: 0.55; }\n.cal-cell.past { color: var(--ink-mute); cursor: not-allowed; opacity: 0.35; }\n.cal-cell.free:hover { border-color: var(--copper); }\n.cal-cell.sel { background: var(--copper); color: var(--paper); }\n.cal-legend {\n  display: flex; gap: 18px; flex-wrap: wrap; padding: 0 14px 14px;\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--ink-mute);\n}\n.cal-legend i { display: inline-block; width: 10px; height: 10px; margin-right: 6px; vertical-align: -1px; border: 1px solid var(--rule); }\n.cal-legend .lg-free i { background: var(--paper); }\n.cal-legend .lg-busy i { background: var(--paper-deep); }\n.cal-legend .lg-sel i { background: var(--copper); border-color: var(--copper); }\n.cal-illus {\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--ink-mute);\n  padding: 10px 14px; border-top: 1px solid var(--rule-soft); font-style: normal;\n}\n\n/* booking form */\n.bk-field { margin-bottom: 18px; }\n.bk-field label {\n  display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: var(--ink-mute); margin-bottom: 7px;\n}\n.bk-field input, .bk-field select, .bk-field textarea {\n  width: 100%; font-family: var(--serif-text); font-size: 16px; color: var(--ink);\n  background: var(--paper); border: 1px solid var(--rule); padding: 12px 14px;\n  border-radius: 0; -webkit-appearance: none; appearance: none;\n}\n.bk-field textarea { min-height: 84px; resize: vertical; }\n.bk-field input:focus, .bk-field select:focus, .bk-field textarea:focus {\n  outline: none; border-color: var(--copper);\n}\n.bk-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n@media (max-width: 480px) { .bk-row { grid-template-columns: 1fr; } }\n.bk-actions { margin-top: 22px; }\n.bk-send {\n  margin-top: 18px; border-top: 1px solid var(--rule); padding-top: 18px;\n  display: none;\n}\n.bk-send.on { display: block; }\n.bk-send-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: var(--ink-mute); margin-bottom: 12px; }\n.bk-send-row { display: flex; gap: 10px; flex-wrap: wrap; }\n.bk-preview {\n  margin-top: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.6; color: var(--ink-soft);\n  background: var(--paper); border: 1px solid var(--rule-soft); padding: 14px; white-space: pre-wrap;\n}\n\n/* contacts band (footer) */\n.contact-band { background: var(--dark-bg); color: var(--paper); border: 0; }\n.contact-band a { color: #d8a47a; }\n.contact-grid {\n  display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: clamp(24px,4vw,64px); align-items: start;\n}\n.contact-band h2 {\n  font-family: var(--serif-display); font-weight: 400; font-size: clamp(28px,3.4vw,44px);\n  line-height: 1.08; color: var(--paper); max-width: 18ch; margin-bottom: 8px;\n}\n.contact-band .eyebrow { color: rgba(239,231,210,0.55); margin-bottom: 14px; }\n.contact-list { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; line-height: 2; text-transform: uppercase; color: rgba(239,231,210,0.7); }\n.contact-list dt { color: rgba(239,231,210,0.45); }\n.contact-list dd { margin: 0 0 14px; }\n@media (max-width: 760px) { .contact-grid { grid-template-columns: 1fr; gap: 32px; } }\n\n/* small footer */\n.foot {\n  border-top: 1px solid rgba(239,231,210,0.18);\n  padding: 24px var(--gutter); max-width: var(--max); margin: 0 auto;\n  display: flex; justify-content: space-between; gap: 24px; flex-wrap: wrap;\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: rgba(239,231,210,0.45);\n}\n.foot a { color: rgba(239,231,210,0.6); }\n\n/* notice strip (e.g. \"ведётся на русском\") */\n.notice {\n  background: var(--paper-deep); border: 1px solid var(--rule);\n  padding: 16px 20px; display: flex; gap: 14px; align-items: baseline;\n  font-size: 15px; color: var(--ink-soft); margin-bottom: 28px;\n}\n.notice .n-mark { font-family: var(--serif-display); font-style: italic; color: var(--copper); font-size: 18px; }\n\n/* lang display helper: hide inactive language blocks. Rules generated by JS too,\n   but base rules here cover ru/zh out of the box. */\n[data-lang=\"ru\"] [data-l=\"zh\"] { display: none !important; }\n[data-lang=\"zh\"] [data-l=\"ru\"] { display: none !important; }\n\n/* utility */\n.stack-sm > * + * { margin-top: 12px; }\n.muted { color: var(--ink-mute); }\n.center { text-align: center; }\n\n\n/* =====================================================================\n   v3 ADDITIONS — sticky header, mobile menu, carousels, plaques, notes\n   ===================================================================== */\n\n/* sticky header */\n.site-header {\n  position: sticky; top: 0;\n  transition: box-shadow 180ms ease;\n}\n.site-header.scrolled { box-shadow: 0 1px 0 var(--rule), 0 8px 24px rgba(26,22,17,0.07); }\n\n/* hamburger */\n.nav-toggle {\n  display: none;\n  width: 42px; height: 42px; border: 1px solid var(--rule); background: transparent;\n  cursor: pointer; position: relative; flex: 0 0 auto;\n}\n.nav-toggle span, .nav-toggle span::before, .nav-toggle span::after {\n  content: \"\"; position: absolute; left: 10px; width: 20px; height: 1.5px;\n  background: var(--ink); transition: transform 180ms ease, opacity 180ms ease;\n}\n.nav-toggle span { top: 50%; transform: translateY(-50%); }\n.nav-toggle span::before { top: -6px; }\n.nav-toggle span::after { top: 6px; }\n.site-header.open .nav-toggle span { background: transparent; }\n.site-header.open .nav-toggle span::before { transform: translateY(6px) rotate(45deg); }\n.site-header.open .nav-toggle span::after { transform: translateY(-6px) rotate(-45deg); }\n\n@media (max-width: 860px) {\n  .nav-toggle { display: block; }\n  .site-nav {\n    display: none;\n    border-top: 1px solid var(--rule);\n  }\n  .site-header.open .site-nav { display: block; }\n  .site-nav-inner { flex-direction: column; gap: 0; padding: 6px var(--gutter) 14px; }\n  .site-nav a { padding: 13px 0; border-bottom: 1px solid var(--rule-soft); border-left: 2px solid transparent; border-bottom-width: 1px; }\n  .site-nav a[aria-current=\"page\"] { border-bottom-color: var(--rule-soft); border-left-color: var(--copper); padding-left: 12px; }\n  /* on mobile, hide the inline header contacts already hidden; keep lang + CTA compact */\n  .site-header-top { gap: 12px; }\n  .header-actions { gap: 10px; }\n  .btn--sm { padding: 10px 14px; font-size: 13px; }\n}\n@media (max-width: 440px) {\n  .brand-sub { display: none; }\n  .lang-switch button { padding: 7px 9px; }\n}\n\n/* ---------- carousel ---------- */\n.carousel { position: relative; }\n.carousel-track {\n  display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory;\n  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;\n  scrollbar-width: none; padding-bottom: 4px;\n}\n.carousel-track::-webkit-scrollbar { display: none; }\n.carousel-slide { flex: 0 0 100%; scroll-snap-align: start; min-width: 0; }\n.carousel--gallery .carousel-slide { flex-basis: 72%; max-width: 880px; }\n@media (max-width: 700px) { .carousel--gallery .carousel-slide { flex-basis: 88%; } }\n\n.carousel-controls {\n  display: flex; align-items: center; justify-content: space-between; gap: 16px;\n  margin-top: 18px;\n}\n.carousel-dots { display: flex; gap: 8px; flex-wrap: wrap; }\n.carousel-dots button {\n  width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--rule);\n  background: transparent; padding: 0; cursor: pointer;\n}\n.carousel-dots button[aria-current=\"true\"] { background: var(--copper); border-color: var(--copper); }\n.carousel-arrows { display: flex; gap: 8px; }\n.carousel-arrows button {\n  width: 40px; height: 40px; border: 1px solid var(--rule); background: var(--paper);\n  font-family: var(--mono); font-size: 15px; color: var(--ink-soft); cursor: pointer;\n}\n.carousel-arrows button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n.carousel-arrows button[disabled] { opacity: 0.3; cursor: default; }\n.carousel-arrows button[disabled]:hover { background: var(--paper); color: var(--ink-soft); border-color: var(--rule); }\n\n/* testimonial slide as a self-contained card */\n.tcard {\n  border: 1px solid var(--rule); background: var(--paper-soft);\n  padding: clamp(28px, 4vw, 48px); height: 100%;\n  display: flex; flex-direction: column;\n}\n.tcard .pull {\n  font-family: var(--serif-display); font-size: clamp(22px, 2.4vw, 30px); line-height: 1.32;\n  color: var(--ink); margin-bottom: auto; padding-bottom: 28px; text-wrap: pretty;\n}\n.tcard .pull em { font-style: italic; color: var(--copper); }\n.tcard .pull::before {\n  content: \"“\"; font-family: var(--serif-display); color: var(--copper);\n  font-size: 1.3em; line-height: 0; margin-right: 4px; vertical-align: -0.05em;\n}\n.tcard figcaption {\n  border-top: 1px solid var(--rule); padding-top: 16px;\n  display: grid; grid-template-columns: 44px 1fr; gap: 14px; align-items: center;\n}\n\n/* gallery carousel tile */\n.gtile {\n  position: relative; aspect-ratio: 16/10; background: var(--paper-deep);\n  border: 1px solid var(--rule); overflow: hidden;\n}\n.gtile .gph {\n  position: absolute; inset: 0;\n  background-image: linear-gradient(135deg, transparent 49%, rgba(26,22,17,0.10) 49%, rgba(26,22,17,0.10) 51%, transparent 51%);\n  background-size: 8px 8px;\n}\n.gtile .slot-stamp { position: absolute; top: 12px; left: 14px; font-family: var(--serif-display); font-style: italic; font-size: 13px; color: var(--copper); }\n.gtile .slot-corner { position: absolute; top: 12px; right: 14px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }\n.gtile figcaption { position: absolute; left: 14px; right: 14px; bottom: 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); }\n\n/* ---------- program plaques (under calendar) ---------- */\n.plaques {\n  margin-top: clamp(28px, 3.5vw, 44px);\n  border-top: 1px solid var(--rule); padding-top: clamp(24px, 3vw, 36px);\n}\n.plaques-label {\n  font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;\n  color: var(--ink-mute); margin-bottom: 16px;\n}\n.plaque-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n@media (max-width: 620px) { .plaque-row { grid-template-columns: 1fr; } }\n.plaque {\n  position: relative; display: flex; flex-direction: column; gap: 6px;\n  border: 1px solid var(--rule); background: var(--paper); padding: 18px 20px;\n  color: inherit; transition: background 160ms ease, border-color 160ms ease;\n}\n.plaque:hover { background: var(--paper-soft); border-color: var(--ink); }\n.plaque.is-current { border-color: var(--copper); }\n.plaque-kick { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); }\n.plaque-title { font-family: var(--serif-display); font-size: clamp(20px, 2vw, 24px); color: var(--ink); line-height: 1.1; }\n.plaque-foot { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-top: 6px; }\n.plaque-price { font-family: var(--serif-display); font-size: 17px; color: var(--copper); }\n.plaque-go { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--copper); }\n\n/* tooltip */\n.tip { position: relative; }\n.tip-pop {\n  position: absolute; left: 20px; right: 20px; bottom: calc(100% + 8px);\n  background: var(--dark-bg); color: var(--paper); padding: 12px 14px;\n  font-family: var(--serif-text); font-size: 13px; line-height: 1.45;\n  opacity: 0; visibility: hidden; transform: translateY(4px);\n  transition: opacity 150ms ease, transform 150ms ease, visibility 150ms;\n  z-index: 8; box-shadow: 0 10px 30px rgba(26,22,17,0.18); pointer-events: none;\n}\n.tip-pop::after {\n  content: \"\"; position: absolute; left: 28px; top: 100%;\n  border: 6px solid transparent; border-top-color: var(--dark-bg);\n}\n.plaque:hover .tip-pop, .plaque:focus-visible .tip-pop { opacity: 1; visibility: visible; transform: translateY(0); }\n@media (hover: none) { .tip-pop { display: none; } }\n\n/* ---------- epochs timeline (Dalian) ---------- */\n.epochs { border-top: 1px solid var(--rule); }\n.epoch {\n  display: grid; grid-template-columns: 200px 120px 1fr; gap: clamp(20px, 3vw, 48px);\n  padding: clamp(28px, 3.5vw, 44px) 0; border-bottom: 1px solid var(--rule); align-items: baseline;\n}\n.epoch-years { font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em; color: var(--ink-mute); }\n.epoch-years b { display: block; font-family: var(--serif-display); font-style: italic; font-size: 26px; color: var(--ep, var(--copper)); letter-spacing: 0; margin-bottom: 4px; font-weight: 400; }\n.epoch-name { font-family: var(--serif-display); font-size: clamp(20px, 2vw, 26px); color: var(--ink); }\n.epoch-name small { display:block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--ink-mute); margin-top:4px; }\n.epoch-body { color: var(--ink-soft); max-width: 54ch; }\n.epoch-body strong { color: var(--ink); font-weight: 500; }\n@media (max-width: 760px) { .epoch { grid-template-columns: 1fr; gap: 10px; } }\n\n/* ---------- notes / journal ---------- */\n.notes-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); }\n.note {\n  border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule);\n  padding: clamp(24px, 3vw, 36px); display: flex; flex-direction: column; gap: 12px;\n}\n.note-date { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--copper); }\n.note h3 { font-family: var(--serif-display); font-size: clamp(20px, 2vw, 25px); line-height: 1.15; font-weight: 500; }\n.note p { color: var(--ink-soft); font-size: 16px; }\n@media (max-width: 820px) { .notes-grid { grid-template-columns: 1fr; } }\n\n/* cross-link line under calendar */\n.crosslink {\n  margin-top: 14px; display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--serif-text); font-size: 16px; color: var(--ink-soft);\n  border-bottom: 1px solid var(--rule); padding-bottom: 4px;\n}\n.crosslink b { color: var(--copper); font-weight: 500; }\n.crosslink:hover { border-bottom-color: var(--ink); color: var(--ink); }\n\n\n/* =====================================================================\n   v4 — motion, term tooltips, weather\n   ===================================================================== */\n\n/* scroll reveal — JS toggles inline opacity/transform; CSS only smooths it.\n   Visibility never depends on an animation completing (fails safe to visible). */\n.js-reveal [data-reveal] {\n  transition: opacity 600ms cubic-bezier(.22,.61,.36,1), transform 600ms cubic-bezier(.22,.61,.36,1);\n  transition-delay: var(--rd, 0ms);\n}\n@media (prefers-reduced-motion: reduce) {\n  .js-reveal [data-reveal] { transition: none !important; }\n}\n\n/* hover lift for interactive cards */\n.teaser, .note, .plaque { transition: background 160ms ease, border-color 160ms ease, transform 220ms cubic-bezier(.22,.61,.36,1), box-shadow 220ms ease; }\n.teaser:hover, .note:hover { transform: translateY(-3px); box-shadow: 0 14px 34px rgba(26,22,17,0.08); }\n.note { text-decoration: none; color: inherit; }\n\n/* route number subtle count-up feel on reveal */\n.route-num { transition: color 300ms ease; }\n\n/* inline term with dotted underline + tooltip */\n.term {\n  position: relative; border-bottom: 1px dotted var(--copper);\n  cursor: help; color: inherit;\n}\n.term > .term-pop {\n  position: absolute; left: 50%; bottom: calc(100% + 10px);\n  transform: translateX(-50%) translateY(4px);\n  width: min(300px, 78vw); background: var(--dark-bg); color: var(--paper);\n  font-family: var(--serif-text); font-style: normal; font-weight: 400;\n  font-size: 14px; line-height: 1.5; letter-spacing: 0; text-transform: none;\n  padding: 13px 15px; box-shadow: 0 12px 32px rgba(26,22,17,0.2);\n  opacity: 0; visibility: hidden; transition: opacity 160ms ease, transform 160ms ease, visibility 160ms;\n  z-index: 9; pointer-events: none; text-align: left;\n}\n.term > .term-pop::after {\n  content: \"\"; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);\n  border: 7px solid transparent; border-top-color: var(--dark-bg);\n}\n.term:hover > .term-pop, .term:focus-visible > .term-pop { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }\n\n/* weather strip under calendar */\n.cal-weather {\n  border: 1px solid var(--rule); border-top: 0; background: var(--paper);\n  padding: 12px 14px; display: flex; align-items: center; gap: 14px;\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--ink-soft);\n  min-height: 46px;\n}\n.cal-weather .wx-ico { font-size: 18px; line-height: 1; }\n.cal-weather .wx-temp { font-family: var(--serif-display); font-size: 18px; color: var(--ink); letter-spacing: 0; }\n.cal-weather .wx-desc { color: var(--ink-mute); text-transform: none; letter-spacing: 0.02em; font-family: var(--serif-text); font-size: 13px; }\n.cal-weather .wx-muted { color: var(--ink-mute); text-transform: none; font-family: var(--serif-text); font-size: 13px; }\n.cal-weather .wx-label { color: var(--ink-mute); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div data-site-header=\"\" data-page=\"home\"><\u002Fdiv>\n\n<main>\n\n<!-- ============== HERO ============== -->\n<section class=\"hero\">\n  <div class=\"wrap hero-grid\">\n    <div>\n      <div class=\"hero-eyebrow\">\n        <span class=\"dash\"><\u002Fspan>\n        <span class=\"eyebrow\">Dalian · Lüshun · 1899–1905<\u002Fspan>\n      <\u002Fdiv>\n\n      <div data-l=\"ru\">\n        <h1 class=\"display hero-title cu\">Исторические<br>программы<br>на&nbsp;<em>местности<\u002Fem><\u002Fh1>\n        <p class=\"hero-subtitle\">Прогулки-лекции по&nbsp;Даляню и&nbsp;Порт-Артуру&nbsp;— там, где история происходила<\u002Fp>\n        <p class=\"lead hero-lead\">\n          Каждая программа&nbsp;— связный разговор об&nbsp;эпохе на&nbsp;тех&nbsp;местах,\n          где она&nbsp;разворачивалась. Ведёт историк-архивист; маршруты собраны\n          по&nbsp;первоисточникам.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div data-l=\"zh\">\n        <h1 class=\"display hero-title cu\">实地<br><em>历史讲座<\u002Fem><br>项目<\u002Fh1>\n        <p class=\"lead hero-lead\">\n          在大连与旅顺的历史漫步与实地讲座。每个项目都是在历史事件发生地展开的连贯讲述，\n          由历史档案研究者主讲，路线依据第一手史料编排。\n        <\u002Fp>\n        <div class=\"notice\" style=\"margin-top:24px\">\n          <span class=\"n-mark\">※<\u002Fspan>\n          <span>项目以<strong style=\"color:var(--copper)\">俄语<\u002Fstrong>进行。适合为俄语客人预订文化项目的中国企业与机构。<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"hero-actions\" style=\"margin-top:36px\">\n        <a href=\"#booking\" class=\"btn\" data-i18n=\"cta_request\"><\u002Fa>\n        <a href=\"#routes\" class=\"link-inline\" data-l=\"ru\">Две программы ниже<\u002Fa>\n        <a href=\"#routes\" class=\"link-inline\" data-l=\"zh\">两个项目<\u002Fa>\n      <\u002Fdiv>\n\n      <dl class=\"hero-meta-strip\" data-l=\"ru\">\n        <div><dt>Далянь<\u002Fdt><dd>4–5 часов<\u002Fdd><\u002Fdiv>\n        <div><dt>Порт-Артур<\u002Fdt><dd>6–8 часов<\u002Fdd><\u002Fdiv>\n        <div><dt>Язык<\u002Fdt><dd>русский<\u002Fdd><\u002Fdiv>\n        <div><dt>Группа<\u002Fdt><dd>до 12 человек<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <div class=\"hero-fig-stack\">\n      <figure class=\"hero-figure\">\n        <span class=\"slot-stamp\">tab. I<\u002Fspan>\n        <span class=\"slot-corner\">Liaodong<\u002Fspan>\n        <svg viewBox=\"0 0 400 500\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n          <defs>\n            <pattern id=\"h1\" width=\"6\" height=\"6\" patternUnits=\"userSpaceOnUse\" patternTransform=\"rotate(35)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"6\" stroke=\"#1a1611\" stroke-width=\"0.4\" opacity=\"0.3\"><\u002Fline><\u002Fpattern>\n            <pattern id=\"h2\" width=\"4\" height=\"4\" patternUnits=\"userSpaceOnUse\" patternTransform=\"rotate(-25)\"><line x1=\"0\" y1=\"0\" x2=\"0\" y2=\"4\" stroke=\"#1a1611\" stroke-width=\"0.3\" opacity=\"0.2\"><\u002Fline><\u002Fpattern>\n          <\u002Fdefs>\n          <rect x=\"0\" y=\"0\" width=\"400\" height=\"500\" fill=\"url(#h2)\" opacity=\"0.5\"><\u002Frect>\n          <path d=\"M -20,330 C 70,300 140,330 200,300 C 270,265 320,300 420,250 L 420,520 L -20,520 Z\" fill=\"#e4d9bc\" stroke=\"#1a1611\" stroke-width=\"0.8\"><\u002Fpath>\n          <path d=\"M -20,330 C 70,300 140,330 200,300 C 270,265 320,300 420,250 L 420,520 L -20,520 Z\" fill=\"url(#h1)\" opacity=\"0.5\"><\u002Fpath>\n          <g fill=\"none\" stroke=\"#1a1611\" stroke-width=\"0.5\" opacity=\"0.4\">\n            <path d=\"M -20,300 C 70,275 145,300 205,272 C 270,242 320,270 420,222\"><\u002Fpath>\n            <path d=\"M -20,270 C 70,250 150,272 210,245 C 272,218 322,242 420,196\"><\u002Fpath>\n          <\u002Fg>\n          <!-- two cross marks: Dalian + Lüshun -->\n          <g stroke=\"#7a2e2a\" stroke-width=\"1.4\" fill=\"none\">\n            <g transform=\"translate(250,250)\"><line x1=\"-6\" y1=\"0\" x2=\"6\" y2=\"0\"><\u002Fline><line x1=\"0\" y1=\"-6\" x2=\"0\" y2=\"6\"><\u002Fline><\u002Fg>\n            <g transform=\"translate(150,330)\"><line x1=\"-6\" y1=\"0\" x2=\"6\" y2=\"0\"><\u002Fline><line x1=\"0\" y1=\"-6\" x2=\"0\" y2=\"6\"><\u002Fline><\u002Fg>\n          <\u002Fg>\n          <text x=\"262\" y=\"246\" font-family=\"EB Garamond, serif\" font-style=\"italic\" font-size=\"13\" fill=\"#7a2e2a\">Далянь<\u002Ftext>\n          <text x=\"92\" y=\"350\" font-family=\"EB Garamond, serif\" font-style=\"italic\" font-size=\"13\" fill=\"#7a2e2a\">Люйшунь<\u002Ftext>\n          <path d=\"M 250,250 L 150,330\" stroke=\"#7a2e2a\" stroke-width=\"0.8\" stroke-dasharray=\"1.5 3\" opacity=\"0.7\"><\u002Fpath>\n          <g transform=\"translate(60,90)\" stroke=\"#1a1611\" fill=\"none\" stroke-width=\"0.6\" opacity=\"0.7\"><circle r=\"20\"><\u002Fcircle><line x1=\"0\" y1=\"-24\" x2=\"0\" y2=\"24\"><\u002Fline><line x1=\"-24\" y1=\"0\" x2=\"24\" y2=\"0\"><\u002Fline><polygon points=\"0,-20 3,0 0,20 -3,0\" fill=\"#1a1611\" opacity=\"0.6\" stroke=\"none\"><\u002Fpolygon><\u002Fg>\n          <text x=\"60\" y=\"56\" text-anchor=\"middle\" font-family=\"EB Garamond, serif\" font-style=\"italic\" font-size=\"11\" fill=\"#1a1611\" opacity=\"0.7\">N<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Ffigure>\n      <div class=\"hero-fig-meta\">\n        <span data-l=\"ru\">Ляодунский полуостров<\u002Fspan><span data-l=\"zh\">辽东半岛<\u002Fspan>\n        <span>Pl. I<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ABOUT (short) ============== -->\n<section class=\"anchor\">\n  <div class=\"wrap anchor-grid\">\n    <div class=\"anchor-meta\">\n      § 01 · <span data-l=\"ru\">О&nbsp;проекте<\u002Fspan><span data-l=\"zh\">关于项目<\u002Fspan>\n      <strong data-l=\"ru\">Историк ведёт, маршрут&nbsp;— под&nbsp;разговор.<\u002Fstrong>\n      <strong data-l=\"zh\">由历史学者讲述。<\u002Fstrong>\n    <\u002Fdiv>\n    <div>\n      <p data-l=\"ru\">\n        Небольшой авторский проект в&nbsp;Даляне: исторические программы по&nbsp;городу\n        и&nbsp;по&nbsp;Порт-Артуру. Формат&nbsp;— прогулка-лекция: разбор событий\n        конца&nbsp;XIX&nbsp;– начала&nbsp;XX&nbsp;века на&nbsp;местах, где они&nbsp;происходили.\n        Ведёт историк с&nbsp;четырнадцатью годами работы в&nbsp;государственном архиве.\n      <\u002Fp>\n      <p data-l=\"zh\">\n        位于大连的小型作者项目：关于大连市区与旅顺的历史项目。形式为历史漫步与实地讲座——\n        在事件发生地讲解19世纪末至20世纪初的历史。主讲人为具有十四年国家档案馆工作经验的历史学者。\n      <\u002Fp>\n      <a href=\"historian.html\" class=\"link-inline\" style=\"margin-top:24px;display:inline-block\" data-l=\"ru\">Об историке →<\u002Fa>\n      <a href=\"historian.html\" class=\"link-inline\" style=\"margin-top:24px;display:inline-block\" data-l=\"zh\">关于讲者 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== TWO ROUTES (separate teasers) ============== -->\n<section id=\"routes\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">§ 02 · <span data-l=\"ru\">Программы<\u002Fspan><span data-l=\"zh\">项目<\u002Fspan><\u002Fspan>\n      <h2 class=\"cu\" data-l=\"ru\">Две программы, <em>каждая&nbsp;— отдельно<\u002Fem>.<\u002Fh2>\n      <h2 class=\"cu\" data-l=\"zh\">两个项目，<em>各自独立<\u002Fem>。<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"teasers\">\n      <!-- Teaser 1: Dalian -->\n      <a class=\"teaser\" href=\"dalian.html\">\n        <div class=\"teaser-figure\"><span class=\"gph\"><\u002Fspan><span class=\"slot-stamp\">pl. II<\u002Fspan><\u002Fdiv>\n        <div class=\"teaser-kicker\">01 · <span data-l=\"ru\">Центр Даляня · 4–5 часов<\u002Fspan><span data-l=\"zh\">大连市中心 · 4–5 小时<\u002Fspan><\u002Fdiv>\n        <h3 data-l=\"ru\">Центр Даляня<\u002Fh3>\n        <h3 data-l=\"zh\">大连市中心<\u002Fh3>\n        <p data-l=\"ru\">\n          Город, заложенный Россией как&nbsp;Дальний и&nbsp;достроенный Японией:\n          круглая площадь, вокзал, кварталы. Как&nbsp;колониальная планировка\n          определила сегодняшний центр.\n        <\u002Fp>\n        <p data-l=\"zh\">\n          这座城市由俄国始建、名为“达里尼”，后由日本续建：圆形广场、火车站、街区。\n          殖民时期的规划如何塑造了今天的市中心。\n        <\u002Fp>\n        <div class=\"teaser-foot\">\n          <div class=\"teaser-price\"><span data-l=\"ru\">Ориентир<\u002Fspan><span data-l=\"zh\">参考价<\u002Fspan>от&nbsp;1000&nbsp;¥<\u002Fdiv>\n          <span class=\"teaser-go\"><span data-l=\"ru\">Подробнее<\u002Fspan><span data-l=\"zh\">详情<\u002Fspan> →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- Teaser 2: Port-Artur -->\n      <a class=\"teaser\" href=\"port-artur.html\">\n        <div class=\"teaser-figure\"><span class=\"gph\"><\u002Fspan><span class=\"slot-stamp\">pl. III<\u002Fspan><\u002Fdiv>\n        <div class=\"teaser-kicker\">02 · <span data-l=\"ru\">Порт-Артур / Люйшунь · 6–8 часов<\u002Fspan><span data-l=\"zh\">旅顺 · 6–8 小时<\u002Fspan><\u002Fdiv>\n        <h3 data-l=\"ru\">Порт-Артур / Люйшунь<\u002Fh3>\n        <h3 data-l=\"zh\">旅顺<\u002Fh3>\n        <p data-l=\"ru\">\n          Места русско-японской войны 1904–1905&nbsp;годов: высоты, форты,\n          военное кладбище. Пять точек, собранных в&nbsp;одну линию разговора\n          об&nbsp;осаде и&nbsp;её&nbsp;последствиях.\n        <\u002Fp>\n        <p data-l=\"zh\">\n          1904–1905年日俄战争的发生地：高地、堡垒、军人墓地。五个地点串联成\n          一条关于围城及其后果的完整叙述。\n        <\u002Fp>\n        <div class=\"teaser-foot\">\n          <div class=\"teaser-price\"><span data-l=\"ru\">Ориентир<\u002Fspan><span data-l=\"zh\">参考价<\u002Fspan>от&nbsp;1800&nbsp;¥<\u002Fdiv>\n          <span class=\"teaser-go\"><span data-l=\"ru\">Подробнее<\u002Fspan><span data-l=\"zh\">详情<\u002Fspan> →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n\n    <p class=\"price-note\" style=\"margin-top:24px\">\n      <span data-l=\"ru\"><strong>Ориентир по&nbsp;ценам<\u002Fstrong>&nbsp;— гонорар автора за&nbsp;программу, от&nbsp;одного человека. Входные билеты и&nbsp;трансфер&nbsp;— отдельной строкой. Полная раскладка&nbsp;— на&nbsp;странице каждой программы.<\u002Fspan>\n      <span data-l=\"zh\"><strong>价格参考<\u002Fstrong>——作者讲述费用，自一人起。门票与接送费用单列。完整价格见各项目页面。<\u002Fspan>\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== HOOK / DARK QUOTE ============== -->\n<section class=\"dark-cut\" data-l=\"ru\" aria-label=\"Реплика\">\n  <div class=\"wrap dark-cut-grid\">\n    <span class=\"eyebrow eyebrow-rule\">§ 03 · О месте<\u002Fspan>\n    <div>\n      <blockquote>Торговый Дальний строили, чтобы он&nbsp;<em>затмил Шанхай<\u002Fem>. Военный Порт-Артур&nbsp;— чтобы его&nbsp;прикрыть. За&nbsp;шесть лет <em>рухнуло и&nbsp;то, и&nbsp;другое<\u002Fem>.<\u002Fblockquote>\n      <div class=\"attr\">— два города в часе друг от друга<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== METHOD ============== -->\n<section data-l=\"ru\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">§ 04 · Как это устроено<\u002Fspan>\n      <h2 class=\"cu\">На&nbsp;чём всё <em>держится<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"topics\">\n      <article><span class=\"topic-num\">I<\u002Fspan><div>\n        <h3 class=\"topic-title\">По первоисточникам<\u002Fh3>\n        <p class=\"topic-body\">Маршруты собраны на&nbsp;архивных делах, рапортах и&nbsp;переписке эпохи, прочитанных в&nbsp;оригинале.<\u002Fp>\n      <\u002Fdiv><\u002Farticle>\n      <article><span class=\"topic-num\">II<\u002Fspan><div>\n        <h3 class=\"topic-title\">Связный разговор<\u002Fh3>\n        <p class=\"topic-body\">Каждая точка работает на&nbsp;общую линию: от&nbsp;большой политики 1890-х к&nbsp;тому, что выросло из&nbsp;войны.<\u002Fp>\n      <\u002Fdiv><\u002Farticle>\n      <article><span class=\"topic-num\">III<\u002Fspan><div>\n        <h3 class=\"topic-title\">На местности<\u002Fh3>\n        <p class=\"topic-body\">События разбираются там, где они&nbsp;происходили: высоты, кварталы, форты, гавань.<\u002Fp>\n      <\u002Fdiv><\u002Farticle>\n      <article><span class=\"topic-num\">IV<\u002Fspan><div>\n        <h3 class=\"topic-title\">Спокойный темп<\u002Fh3>\n        <p class=\"topic-body\">День на&nbsp;один сюжет, с&nbsp;остановками и&nbsp;ответами на&nbsp;вопросы. Группа&nbsp;— до&nbsp;12&nbsp;человек.<\u002Fp>\n      <\u002Fdiv><\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== NOTES / ЗАМЕТКИ ============== -->\n<section class=\"vignette\" data-l=\"ru\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">§ 05 · Заметки<\u002Fspan>\n      <h2 class=\"cu\">С&nbsp;чего обычно <em>всё начинается<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"notes-grid\">\n      <a class=\"note\" href=\"dalian.html\">\n        <span class=\"note-date\">Далянь · 1904<\u002Fspan>\n        <h3>Город, сданный без выстрела<\u002Fh3>\n        <p>В&nbsp;мае 1904&nbsp;года русский Дальний достался японцам нетронутым&nbsp;— с&nbsp;доками, складами и&nbsp;углём&nbsp;— и&nbsp;стал базой для&nbsp;осады соседнего Порт-Артура. Один просчёт связал две&nbsp;программы в&nbsp;одну историю.<\u002Fp>\n        <span class=\"teaser-go\">Прогулка по Даляню →<\u002Fspan>\n      <\u002Fa>\n      <a class=\"note\" href=\"port-artur.html\">\n        <span class=\"note-date\">Порт-Артур · 1904<\u002Fspan>\n        <h3>Высота, решившая осаду<\u002Fh3>\n        <p>Бои за&nbsp;одну сопку под&nbsp;Порт-Артуром стоили обеим сторонам тысяч жизней. Когда японцы взяли её&nbsp;вершину, с&nbsp;неё&nbsp;стало видно всю русскую эскадру в&nbsp;гавани&nbsp;— и&nbsp;дни крепости были сочтены.<\u002Fp>\n        <span class=\"teaser-go\">Прогулка по Порт-Артуру →<\u002Fspan>\n      <\u002Fa>\n      <a class=\"note\" href=\"dalian.html\">\n        <span class=\"note-date\">Далянь · 1899 → 1946<\u002Fspan>\n        <h3>Десять имён одной площади<\u002Fh3>\n        <p>Круглая площадь в&nbsp;центре была Николаевской, потом Дайхиробой, потом Чжуншань&nbsp;— в&nbsp;честь Сунь&nbsp;Ятсена. Имена на&nbsp;карте города читаются как&nbsp;хронология четырёх эпох.<\u002Fp>\n        <span class=\"teaser-go\">Прогулка по Даляню →<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== BOOKING (injected) ============== -->\n<div data-booking=\"\" data-program=\"\"><\u002Fdiv>\n\n<\u002Fmain>\n\n<div data-site-footer=\"\"><\u002Fdiv>\n\n\n\n<script src=\"e4c4be2b-6515-4fb1-8494-3ff0c9ce6817\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
